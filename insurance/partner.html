<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Partner Referral Desk</title>
<style>
body{font-family:Arial;max-width:820px;margin:auto;padding:40px;line-height:1.45}
.box{border:1px solid #ddd;padding:28px;border-radius:14px}
input,select,textarea{width:100%;padding:12px;margin:8px 0;font-size:16px}
button{padding:14px 22px;font-size:18px}
.small{font-size:13px;color:#666}
</style>
</head>
<body>
<div class="box">
<h1>Partner Referral Desk</h1>
<p>Submit a homeowner, family, senior, or business owner who asked for insurance information.</p>
<form action="/api/insurance-lead" method="POST">
<input type="hidden" name="source" value="partner_referral_portal">

<label>Referral Type</label>
<select name="coverage_type">
<option>Mortgage Protection</option>
<option>Term Life</option>
<option>Final Expense</option>
<option>IUL</option>
<option>Medicare Supplement</option>
</select>

<label>Prospect Name</label>
<input name="name" required>

<label>Prospect Phone</label>
<input name="phone" required>

<label>Prospect Email</label>
<input name="email">

<label>Prospect State</label>
<input name="state">

<label>Partner / Referrer Name</label>
<input name="partner_name">

<label>Situation / Notes</label>
<textarea name="notes" placeholder="Example: new homeowner, has spouse/kids, asked about mortgage protection..."></textarea>

<button type="submit">Submit Referral</button>
</form>

<p class="small">Only submit people who requested information or gave permission to be contacted.</p>
</div>
</body>
</html>
